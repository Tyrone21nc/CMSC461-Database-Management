services:
  db: # here "db" is what you put in the host name section on the pgadmin on the browser
    image: postgres:15
    container_name: parking_db_v2
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: parking_system
    ports:
      - "5433:5432"
      # on the website, make sure to set port to 5432 not 5433
    volumes:
      - postgres_data:/var/lib/postgresql/data


# localhost sign in on browser
  pgadmin:
    image: dpage/pgadmin4
    container_name: parking_pgadmin_v2
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: user@test.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  postgres_data: